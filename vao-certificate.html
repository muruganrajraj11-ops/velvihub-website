<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAO Digital Certificate | VelviHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Times New Roman',serif;
background:#0a192f;
padding:20px;
}

.form-section{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.form-section h2{
text-align:center;
margin-bottom:20px;
color:#0a192f;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#007bff;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-right:10px;
}

button:hover{
background:#0056b3;
}

.certificate{
max-width:1100px;
margin:auto;
background:white;
padding:60px;
border:12px solid #d4af37;
display:none;
position:relative;
}

.logo{
text-align:center;
font-size:50px;
}

.title{
text-align:center;
font-size:42px;
font-weight:bold;
color:#0a192f;
margin-top:20px;
}

.subtitle{
text-align:center;
font-size:22px;
margin-top:15px;
}

.name{
text-align:center;
font-size:38px;
font-weight:bold;
color:#004aad;
margin:30px 0;
}

.content{
text-align:center;
font-size:22px;
line-height:1.8;
}

.score-box{
margin-top:30px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.footer{
margin-top:60px;
display:flex;
justify-content:space-between;
}

.sign{
text-align:center;
font-size:18px;
}

.badge{
position:absolute;
top:30px;
right:30px;
font-size:70px;
}

</style>

</head>

<body>

<div class="form-section">

<h2>🏆 VAO Certificate Generator</h2>

<input
type="text"
id="candidateName"
placeholder="Candidate Name"
>

<input
type="text"
id="testName"
placeholder="Test Name"
value="VAO Final Mega Test"
>

<input
type="number"
id="score"
placeholder="Score"
max="100"
min="0"
>

<button onclick="generateCertificate()">
Generate Certificate
</button>

<button onclick="window.print()">
Print Certificate
</button>

</div>

<div class="certificate" id="certificate">

<div class="badge">🎖️</div>

<div class="logo">
🏛
</div>

<div class="title">
VELVIHUB
</div>

<div class="subtitle">
Certificate of Achievement
</div>

<div class="content">

This Certificate is Proudly Presented To

</div>

<div class="name" id="certName">
Candidate Name
</div>

<div class="content">

For Successfully Completing

<br><br>

<b id="certTest">
VAO Final Mega Test
</b>

</div>

<div class="score-box">

Score :
<span id="certScore"></span>

<br>

Percentage :
<span id="certPercentage"></span>

<br>

Grade :
<span id="certGrade"></span>

</div>

<div class="footer">

<div class="sign">

_________________

<br>

Exam Coordinator

</div>

<div class="sign">

_________________

<br>

VelviHub Director

</div>

</div>

</div>

<script>

function generateCertificate(){

let name =
document.getElementById(
"candidateName"
).value;

let test =
document.getElementById(
"testName"
).value;

let score =
parseInt(
document.getElementById(
"score"
).value
);

if(!name || isNaN(score)){

alert(
"Please Enter Name and Score"
);

return;

}

let percentage = score;

let grade = "FAIL";

if(score>=90){
grade="A+";
}
else if(score>=80){
grade="A";
}
else if(score>=70){
grade="B";
}
else if(score>=60){
grade="C";
}
else if(score>=50){
grade="D";
}

document.getElementById(
"certName"
).innerHTML=name;

document.getElementById(
"certTest"
).innerHTML=test;

document.getElementById(
"certScore"
).innerHTML=score + " / 100";

document.getElementById(
"certPercentage"
).innerHTML=percentage + "%";

document.getElementById(
"certGrade"
).innerHTML=grade;

document.getElementById(
"certificate"
).style.display="block";

}

</script>

</body>
</html>
