<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VelviHub Blog Advanced</title>

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
position:sticky;
top:0;
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 20px rgba(56,189,248,.2);
}

.navbar a{
color:#38bdf8;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

/* ===== HERO ===== */
.hero{
text-align:center;
padding:60px 20px 20px;
}

.hero h1{
font-size:45px;
color:#38bdf8;
text-shadow:0 0 20px #38bdf8;
}

.hero p{
color:#cbd5e1;
margin-top:10px;
}

/* ===== SEARCH ===== */
.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:320px;
max-width:90%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
text-align:center;
}

/* ===== FILTER ===== */
.filter{
text-align:center;
margin:10px;
}

.filter button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
transition:.3s;
}

.filter button:hover{
background:#38bdf8;
color:black;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
max-width:1200px;
margin:auto;
}

/* ===== CARD ===== */
.card{
background:#1e293b;
padding:20px;
border-radius:18px;
box-shadow:0 0 20px rgba(56,189,248,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 40px rgba(56,189,248,.6);
}

.card h3{
color:#38bdf8;
margin-bottom:10px;
}

.card p{
color:#cbd5e1;
line-height:1.6;
margin-bottom:10px;
}

.tag{
font-size:12px;
padding:5px 10px;
background:#38bdf8;
color:black;
border-radius:6px;
display:inline-block;
margin-bottom:10px;
}

/* ===== BUTTON ===== */
.card a{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#38bdf8;
color:black;
font-weight:bold;
border-radius:8px;
text-decoration:none;
}

/* ===== FOOTER ===== */
.footer{
text-align:center;
padding:20px;
margin-top:30px;
background:#020617;
color:#cbd5e1;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<div style="color:#38bdf8;font-weight:bold;">🚀 VelviHub Blog</div>
<div>
<a href="#">Home</a>
<a href="#">Courses</a>
<a href="#">Contact</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>VelviHub Advanced Blog</h1>
<p>Search • Learn • Grow 🚀 Networking + AI + Career Guide</p>
</div>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search articles..." onkeyup="filterCards()">
</div>

<!-- FILTER -->
<div class="filter">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('network')">Networking</button>
<button onclick="filterCategory('ai')">AI Tools</button>
<button onclick="filterCategory('career')">Career</button>
</div>

<!-- BLOG GRID -->
<div class="grid" id="blogGrid"></div>

<!-- FOOTER -->
<div class="footer">
© 2026 VelviHub | Advanced Learning Platform
</div>

<script>

/* ===== BLOG DATA ===== */
const blogs = [
{
title:"IP Address Basics",
desc:"IP Address, IPv4, IPv6 முழுமையான அடிப்படை விளக்கம்.",
tag:"network",
link:"ip.html"
},
{
title:"Subnet Mask Tricks",
desc:"Subnet Mask calculation easy method.",
tag:"network",
link:"#"
},
{
title:"AI Tools for YouTube",
desc:"YouTube growth-க்கு best AI tools.",
tag:"ai",
link:"#"
},
{
title:"CCNA Roadmap",
desc:"Step by step CCNA exam preparation guide.",
tag:"career",
link:"#"
},
{
title:"Networking Fundamentals",
desc:"Router, Switch, DNS basics explained simply.",
tag:"network",
link:"#"
},
{
title:"Job Interview Tips",
desc:"IT interview success strategies.",
tag:"career",
link:"#"
}
];

let currentFilter = "all";

/* ===== LOAD CARDS ===== */
function loadCards(){
const grid = document.getElementById("blogGrid");
grid.innerHTML = "";

blogs.forEach(blog => {

if(currentFilter !== "all" && blog.tag !== currentFilter){
return;
}

grid.innerHTML += `
<div class="card">
<span class="tag">${blog.tag.toUpperCase()}</span>
<h3>${blog.title}</h3>
<p>${blog.desc}</p>
<a href="${blog.link}">Read More</a>
</div>
`;

});
}

loadCards();

/* ===== SEARCH ===== */
function filterCards(){
let input = document.getElementById("searchInput").value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card => {
let text = card.innerText.toLowerCase();
card.style.display = text.includes(input) ? "block" : "none";
});
}

/* ===== CATEGORY FILTER ===== */
function filterCategory(cat){
currentFilter = cat;
loadCards();
}

</script>

</body>
</html>
