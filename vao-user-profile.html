<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAO User Profile | VelviHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a192f;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
color:#4fc3ff;
}

.profile-card{
background:#152238;
padding:30px;
border-radius:15px;
}

.profile-image{
text-align:center;
margin-bottom:20px;
}

.profile-image img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #4fc3ff;
}

.profile-image label{
display:inline-block;
margin-top:10px;
padding:10px 18px;
background:#00bfff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.profile-image input{
display:none;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:8px;
color:#4fc3ff;
font-weight:bold;
}

.form-group input,
.form-group select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#1d2f4f;
color:white;
font-size:16px;
}

.save-btn{
width:100%;
padding:14px;
background:#00c853;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}

.save-btn:hover{
background:#00a844;
}

.success{
margin-top:15px;
text-align:center;
color:#7CFC00;
font-weight:bold;
display:none;
}

.info-box{
margin-top:20px;
padding:15px;
background:#1d2f4f;
border-radius:10px;
}

.info-box p{
padding:5px 0;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>👤 User Profile</h1>

<p>Manage Your VAO Learning Account</p>

</div>

<div class="profile-card">

<div class="profile-image">

<img
id="preview"
src="https://via.placeholder.com/140"
alt="Profile Photo"
>

<br>

<label for="photo">
📷 Upload Photo
</label>

<input
type="file"
id="photo"
accept="image/*"
>

</div>

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter Your Name"
>

</div>

<div class="form-group">

<label>District</label>

<select id="district">

<option>Chennai</option>
<option>Chengalpattu</option>
<option>Kancheepuram</option>
<option>Vellore</option>
<option>Ranipet</option>
<option>Tiruvallur</option>
<option>Madurai</option>
<option>Coimbatore</option>
<option>Salem</option>
<option>Tiruchirappalli</option>
<option>Tirunelveli</option>
<option>Thoothukudi</option>
<option>Erode</option>
<option>Dharmapuri</option>

</select>

</div>

<div class="form-group">

<label>Mobile Number</label>

<input
type="tel"
id="mobile"
placeholder="Enter Mobile Number"
>

</div>

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter Email"
>

</div>

<button
class="save-btn"
onclick="saveProfile()"
>

💾 Save Profile

</button>

<div
class="success"
id="successMsg"
>

✅ Profile Saved Successfully

</div>

<div class="info-box">

<p><b>📚 Course :</b> TNPSC VAO</p>

<p><b>🏆 Portal :</b> VelviHub</p>

<p><b>🌙 Theme :</b> Dark Mode</p>

</div>

</div>

</div>

<script>

window.onload=function(){

let profile=
JSON.parse(
localStorage.getItem("vaoProfile")
);

if(profile){

document.getElementById("name").value=
profile.name || "";

document.getElementById("district").value=
profile.district || "";

document.getElementById("mobile").value=
profile.mobile || "";

document.getElementById("email").value=
profile.email || "";

if(profile.photo){

document.getElementById("preview").src=
profile.photo;

}

}

}

document.getElementById("photo")
.addEventListener("change",function(){

let file=this.files[0];

if(file){

let reader=
new FileReader();

reader.onload=function(e){

document.getElementById("preview").src=
e.target.result;

};

reader.readAsDataURL(file);

}

});

function saveProfile(){

let profile={

name:
document.getElementById("name").value,

district:
document.getElementById("district").value,

mobile:
document.getElementById("mobile").value,

email:
document.getElementById("email").value,

photo:
document.getElementById("preview").src

};

localStorage.setItem(
"vaoProfile",
JSON.stringify(profile)
);

document.getElementById(
"successMsg"
).style.display="block";

setTimeout(()=>{

document.getElementById(
"successMsg"
).style.display="none";

},3000);

}

</script>

</body>
</html>
