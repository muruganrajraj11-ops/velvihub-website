<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAO Settings | VelviHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a192f;
color:white;
padding:20px;
transition:0.3s;
}

.container{
max-width:900px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
color:#4fc3ff;
}

.card{
background:#152238;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.card h2{
color:#4fc3ff;
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

select,
input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:15px;
background:#1d2f4f;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-right:10px;
margin-top:10px;
}

.save-btn{
background:#00c853;
color:white;
}

.reset-btn{
background:#ff9800;
color:white;
}

.clear-btn{
background:#ff4d4d;
color:white;
}

.success{
margin-top:15px;
color:#7CFC00;
font-weight:bold;
display:none;
}

.light-mode{
background:#f5f5f5;
color:#111;
}

.light-mode .card{
background:white;
color:#111;
}

.light-mode select,
.light-mode input{
background:#eeeeee;
color:#111;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>⚙️ VAO Settings</h1>

<p>Customize Your VelviHub Experience</p>

</div>

<div class="card">

<h2>🎨 Theme Settings</h2>

<label>Select Theme</label>

<select id="theme">

<option value="dark">Dark Theme</option>

<option value="light">Light Theme</option>

</select>

</div>

<div class="card">

<h2>🔤 Font Size</h2>

<label>Select Font Size</label>

<select id="fontSize">

<option value="14">Small</option>

<option value="16">Medium</option>

<option value="18">Large</option>

<option value="20">Extra Large</option>

</select>

</div>

<div class="card">

<h2>🌐 Language Settings</h2>

<label>Select Language</label>

<select id="language">

<option value="Tamil">Tamil</option>

<option value="English">English</option>

</select>

</div>

<div class="card">

<h2>🔔 Notification Settings</h2>

<label>

<input
type="checkbox"
id="notification"
style="width:auto;"
>

Enable Notifications

</label>

</div>

<div class="card">

<h2>💾 Save Settings</h2>

<button
class="save-btn"
onclick="saveSettings()"
>

Save Settings

</button>

<button
class="reset-btn"
onclick="resetProgress()"
>

Reset Progress

</button>

<button
class="clear-btn"
onclick="clearAllData()"
>

Clear LocalStorage

</button>

<div
class="success"
id="successMsg"
>

✅ Settings Saved Successfully

</div>

</div>

</div>

<script>

window.onload=function(){

let settings=
JSON.parse(
localStorage.getItem("vaoSettings")
);

if(settings){

document.getElementById("theme").value=
settings.theme;

document.getElementById("fontSize").value=
settings.fontSize;

document.getElementById("language").value=
settings.language;

document.getElementById("notification").checked=
settings.notification;

applySettings(settings);

}

};

function saveSettings(){

let settings={

theme:
document.getElementById("theme").value,

fontSize:
document.getElementById("fontSize").value,

language:
document.getElementById("language").value,

notification:
document.getElementById("notification").checked

};

localStorage.setItem(
"vaoSettings",
JSON.stringify(settings)
);

applySettings(settings);

document.getElementById(
"successMsg"
).style.display="block";

setTimeout(()=>{

document.getElementById(
"successMsg"
).style.display="none";

},3000);

}

function applySettings(settings){

if(settings.theme==="light"){

document.body.classList.add(
"light-mode"
);

}else{

document.body.classList.remove(
"light-mode"
);

}

document.body.style.fontSize=
settings.fontSize+"px";

}

function resetProgress(){

if(
confirm(
"Reset all test progress?"
)
){

localStorage.removeItem(
"vaoProgress"
);

alert(
"Progress Reset Successfully"
);

}

}

function clearAllData(){

if(
confirm(
"Delete all saved data?"
)
){

localStorage.clear();

alert(
"All LocalStorage Data Cleared"
);

location.reload();

}

}

</script>

</body>
</html>
